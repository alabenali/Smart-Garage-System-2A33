<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion des Mecaniciens - Smart Garage</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/smart_garage/public/css/style.css" />
  </head>
  <body>
    <div class="admin-container">
      <aside class="sidebar">
        <div class="logo">
          <i class="fas fa-microchip logo-icon"></i>
          <h2>SMART<span style="color: white">GARAGE</span></h2>
        </div>
        <nav>
          <ul>
            <li>
              <a href="/smart_garage/view/back/mecaniciens.html" class="active">
                <i class="fas fa-user-cog"></i> Gestion des Mecaniciens
              </a>
            </li>
            <li>
              <a href="/smart_garage/view/back/formations.html">
                <i class="fas fa-graduation-cap"></i> Gestion des Formations
              </a>
            </li>
            <li>
              <a href="/smart_garage/view/front/dashboard.html">
                <i class="fas fa-chart-network"></i> Dashboard
              </a>
            </li>
          </ul>
        </nav>
      </aside>

      <main class="main-content">
        <div class="top-bar">
          <h1><i class="fas fa-user-cog"></i> Gestion des Mecaniciens</h1>
          <a class="button-secondary alt" href="/smart_garage/view/back/formations.html">
            <i class="fas fa-arrow-right"></i> Aller aux Formations
          </a>
        </div>

        <div class="actions-bar">
          <p class="page-note">
            <i class="fas fa-database"></i> Base de donnees active : <strong>smart_garage</strong>
          </p>
          <button class="btn-add" id="btnAdd" type="button">
            <i class="fas fa-plus"></i> Ajouter un mecanicien
          </button>
        </div>

        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Nom</th>
                <th>Prenom</th>
                <th>Telephone</th>
                <th>Specialite</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr>
                <td colspan="6">Chargement des mecaniciens...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>

    <div id="modal" class="modal" aria-hidden="true">
      <div class="modal-content">
        <h2 id="modalTitle"><i class="fas fa-user-cog"></i> Ajouter un mecanicien</h2>
        <form id="form" novalidate>
          <input type="hidden" id="id_mecanicien" />

          <div class="form-group">
            <label for="nom">Nom</label>
            <input type="text" id="nom" autocomplete="off" />
          </div>

          <div class="form-group">
            <label for="prenom">Prenom</label>
            <input type="text" id="prenom" autocomplete="off" />
          </div>

          <div class="form-group">
            <label for="telephone">Telephone</label>
            <input type="text" id="telephone" autocomplete="off" />
          </div>

          <div class="form-group">
            <label for="specialite">Specialite</label>
            <select id="specialite">
              <option value="Moteur">Moteur</option>
              <option value="&#201;lectricit&#233;">&#201;lectricit&#233;</option>
              <option value="Carrosserie">Carrosserie</option>
            </select>
          </div>

          <p id="formStatus" class="message-inline"></p>

          <div class="modal-buttons">
            <button type="submit" class="btn-save"><i class="fas fa-save"></i> Enregistrer</button>
            <button type="button" class="btn-cancel" id="btnCancel">
              <i class="fas fa-times"></i> Annuler
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="/smart_garage/public/js/mecaniciens.js"></script>
  </body>
</html>
